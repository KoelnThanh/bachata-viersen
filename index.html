  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --dark: #1a1a1a;
      --gold: #c47f17;
      --gold-light: #d4a03a;
    }
    html, body {
      height: 100%;
    }
    body {
      background: var(--dark);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
      gap: 18px;
    }

    /* Header */
    .header { text-align: center; }
    .header .brand {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold-light);
      font-weight: 600;
    }
    .header .tagline {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 3px;
    }

    /* Book stage */
    .stage {
      perspective: 1400px;
      width: 100%;
      max-width: 740px;
      position: relative;
    }
    .book {
      width: 100%;
      position: relative;
    }

    /* Pages */
    .page {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0,0,0,0.75);
      position: relative;
      backface-visibility: hidden;
      transition: transform 0.6s cubic-bezier(0.645, 0.045, 0.355, 1.000),
                  opacity 0.6s ease;
    }
    .page img { width: 100%; display: block; }

    .page-front { transform: rotateY(0deg); opacity: 1; }
    .page-front.flipped {
      transform: rotateY(-90deg);
      opacity: 0;
      pointer-events: none;
      position: absolute;
      top: 0; left: 0; width: 100%;
    }
    .page-back {
      transform: rotateY(90deg);
      opacity: 0;
      pointer-events: none;
      position: absolute;
      top: 0; left: 0; width: 100%;
    }
    .page-back.active {
      transform: rotateY(0deg);
      opacity: 1;
      pointer-events: auto;
      position: relative;
    }

    /* Badge */
    .page-badge {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.65);
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      pointer-events: none;
      z-index: 2;
      white-space: nowrap;
    }

    /* Navigation */
    .nav {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .nav-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      color: #fff;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .nav-btn:hover  { background: rgba(255,255,255,0.15); border-color: var(--gold); }
    .nav-btn:active { transform: scale(0.88); }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }

    .dots { display: flex; gap: 9px; align-items: center; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active { background: var(--gold); transform: scale(1.35); }

    /* CTA */
    .cta a {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 13px 30px;
      border-radius: 40px;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(196,127,23,0.35);
    }
    .cta a:hover  { background: var(--gold-light); }
    .cta a:active { transform: scale(0.96); }

    .hint {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.4px;
      text-align: center;
    }

    @media (min-width: 600px) {
      .nav-btn { width: 58px; height: 58px; font-size: 26px; }
    }
  </style>
</head>

  <div class="hint">Wischen oder &larr; &rarr; zum Blättern</div>

  <script>
    const front   = document.getElementById('pageFront');
    const back    = document.getElementById('pageBack');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const dots    = [document.getElementById('dot0'), document.getElementById('dot1')];
    let current   = 0;

    function goTo(n) {
      current = n;
      front.classList.toggle('flipped', n === 1);
      back.classList.toggle('active',   n === 1);
      btnPrev.disabled = (n === 0);
      btnNext.disabled = (n === 1);
      dots.forEach((d, i) => d.classList.toggle('active', i === n));
    }

    btnPrev.addEventListener('click', () => current > 0 && goTo(current - 1));
    btnNext.addEventListener('click', () => current < 1 && goTo(current + 1));

    // Touch / Swipe
    let tx = 0;
    const stage = document.getElementById('stage');
    stage.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
    stage.addEventListener('touchend',   e => {
      const dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) > 40) {
        if (dx < 0 && current < 1) goTo(1);
        if (dx > 0 && current > 0) goTo(0);
      }
    });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' && current < 1) goTo(1);
      if (e.key === 'ArrowLeft'  && current > 0) goTo(0);
    });
  </script>
